# vibebox allowlist proxy config. Runs from the vibebox image as non-root uid
# 1000, so no User/Group drop directives (those need root to setuid).

Port 8080
Listen 0.0.0.0
Timeout 600
MaxClients 100
StartServers 5
PidFile "/tmp/tinyproxy.pid"
LogLevel Info

# Which CLIENT IPs may use the proxy. Only the sandbox can reach it (it's on an
# internal-only podman network), so allowing any source here is safe.
Allow 0.0.0.0/0

# The allowlist itself: deny every host EXCEPT those matching allow.txt.
FilterDefaultDeny Yes
Filter "/etc/tinyproxy/allow.txt"
FilterExtended On
FilterCaseSensitive Off

# HTTPS is tunnelled via CONNECT; only permit TLS ports (no plain-text exfil
# to arbitrary ports). The host is still checked against the allowlist.
ConnectPort 443
ConnectPort 563
